<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบรายงานผลคะแนน สก. (Waffle Chart)</title>
  
  <!-- Import Kanit and Inter fonts from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- App Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="tv-mode">
  <div class="dashboard-wrapper" id="dashboard-wrapper">

    <!-- Main Content Area -->
    <main class="dashboard-body" id="dashboard-body">
      <!-- Left side: Waffle Chart (60% width) -->
      <section class="chart-section" id="chart-section">
        <div class="waffle-card" id="waffle-card">
          <div class="waffle-grid" id="waffle-grid">
            <!-- 50 Cells will be dynamically generated by JS -->
          </div>
        </div>
      </section>

      <!-- Right side: Party List (40% width) -->
      <section class="list-section" id="list-section">
        <div class="party-card" id="party-card">
          <h2 class="section-title">สรุปผลจำนวนที่นั่ง</h2>
          <div class="party-list" id="party-list">
            <!-- Party items will be dynamically generated by JS -->
            <div class="loading-spinner" id="loading-spinner">กำลังโหลดข้อมูล...</div>
          </div>
        </div>
      </section>
    </main>

  </div>

  <!-- Candidate Cards Popup Modal -->
  <div id="popup-modal" class="popup-modal hidden">
    <div class="popup-overlay" id="popup-overlay"></div>
    <div class="popup-content">
      <button class="popup-close-btn" id="popup-close-btn">&times;</button>
      <div class="popup-header">
        <img class="popup-party-logo" id="popup-party-logo" src="" alt="Party Logo" onerror="this.style.display='none'">
        <h3 class="popup-title" id="popup-title">รายชื่อผู้สมัคร</h3>
      </div>
      <div class="popup-body" id="popup-body">
        <!-- Candidate list items will be injected here -->
      </div>
    </div>
  </div>

  <!-- Floating Fullscreen Button -->
  <button id="fullscreen-btn" class="fullscreen-btn" title="Enter Fullscreen">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
      <path d="M5 5h5v2H7v3H5V5zm14 0h-5v2h3v3h2V5zM5 19h5v-2H7v-3H5v5zm14 0h-5v-2h3v-3h2v5z"/>
    </svg>
  </button>

  <!-- App Logic -->
  <script src="app.js"></script>
</body>
</html>
